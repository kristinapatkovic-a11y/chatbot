<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školski pomoćnik</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* GORNJI HERO (SLIKA) */
.hero {
    height: 180px;
    background: url("/static/skola.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* tamni sloj preko slike */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

/* NASLOV */
.hero h1 {
    position: relative;
    color: white;
    font-size: 24px;
    z-index: 1;
}

/* CHAT */
#chat {
    max-width: 600px;
    margin: auto;
    padding: 10px;
    padding-bottom: 80px;
}

/* PORUKE */
.message {
    padding: 10px 15px;
    margin: 8px;
    border-radius: 15px;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #ffd3b6;
    margin-left: auto;
}

.bot {
    background: white;
}

/* ANIMACIJA */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* INPUT */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
    font-size: 16px;
}

button {
    padding: 15px;
    border: none;
    background: #ff8b94;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>📚 Školski pametni pomoćnik</h1>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputArea">
    <input id="question" placeholder="Postavi pitanje..." />
    <button onclick="send()">➤</button>
</div>

<script>
async function send() {
    let q = document.getElementById("question").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="message user">${q}</div>`;

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
    });

    let data = await res.json();

    chat.innerHTML += `<div class="message bot">${data.answer}</div>`;

    document.getElementById("question").value = "";
}
</script>

</body>
</html>
</body>
</html>
