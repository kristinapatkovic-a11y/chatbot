<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školski AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #e9eef5;
}

/* HERO */
.hero {
    height: 180px;
    background: url("/static/skola.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

.hero h1 {
    position: relative;
    color: white;
    font-size: 24px;
}

/* CHAT AREA */
#chat {
    max-width: 600px;
    margin: auto;
    padding: 10px;
    padding-bottom: 90px;
}

/* GLASS PORUKE */
.message {
    padding: 12px 16px;
    margin: 8px;
    border-radius: 18px;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
    backdrop-filter: blur(6px);
}

.user {
    background: #ffd3b6;
    margin-left: auto;
}

.bot {
    background: rgba(255,255,255,0.7);
}

/* ANIMACIJA */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* INPUT */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
    font-size: 16px;
}

button {
    padding: 15px;
    border: none;
    background: #4a90e2;
    color: white;
    font-size: 16px;
}

/* TYPING */
.typing {
    display: inline-block;
}

.typing span {
    animation: blink 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}
</style>
</head>

<body>

<div class="hero">
    <h1>📚 Školski AI pomoćnik</h1>
</div>

<div id="chat"></div>

<div id="inputArea">
    <input id="question" placeholder="Postavi pitanje..." />
    <button onclick="send()">➤</button>
</div>

<script>
async function send() {
    let q = document.getElementById("question").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="message user">${q}</div>`;

    // typing animacija
    let typing = document.createElement("div");
    typing.className = "message bot";
    typing.innerHTML = `Piše <span class="typing"><span>.</span><span>.</span><span>.</span></span>`;
    chat.appendChild(typing);

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
    });

    let data = await res.json();

    typing.remove();

    chat.innerHTML += `<div class="message bot">${data.answer}</div>`;

    document.getElementById("question").value = "";
}
</script>

</body>
</html>
